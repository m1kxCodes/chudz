# Configuration for NoFilters Image Generator

[MODEL]
# Model to use from Hugging Face
# Safe Models:
#   - RunDiffusion/Juggernaut-XL-v9 (default, recommended, 8GB)
model_id = RunDiffusion/Juggernaut-XL-v9

# NSFW Model Options
nsfw_model_big_lust = John6666/big-lust-v16-sdxl
nsfw_model_option2 = stabilityai/stable-diffusion-2-1

# Enable NSFW model support (true/false)
enable_nsfw = true

[DEVICE]
# GPU or CPU
# Leave as 'auto' to automatically detect NVIDIA GPU
# Set to 'cuda' to force GPU or 'cpu' to force CPU
device = auto

[SERVER]
# Server host and port
host = 0.0.0.0
port = 8000

[GENERATION]
# Default generation parameters
default_steps = 50
default_guidance_scale = 7.5
default_width = 512
default_height = 512

# Maximum values to prevent resource exhaustion
max_steps = 150
max_guidance_scale = 20
max_width = 768
max_height = 768

[GALLERY]
# Gallery directory for storing generated images
directory = ../gallery

[OPTIMIZATION]
# Enable memory optimizations for smaller GPUs
# Set to true if you have <8GB VRAM
enable_attention_slicing = true

# Use mixed precision (float16) for faster generation on compatible GPUs
use_float16 = true
